services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: CoctailDebucle.Server/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CocktailDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "7047:8080"
    restart: unless-stopped

  client:
    build:
      context: ./coctaildebucle.client
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  sqlserver_data:
